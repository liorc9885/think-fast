<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>המבורגר נופל! 🍔</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 60%, #90EE90 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 2rem;
      color: #c0392b;
      text-shadow: 2px 2px 0 #fff, 3px 3px 0 #e74c3c;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    #hud {
      display: flex;
      gap: 20px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #2c3e50;
      background: rgba(255,255,255,0.7);
      border-radius: 20px;
      padding: 8px 20px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      flex-wrap: wrap;
      justify-content: center;
    }

    #hud span { display: flex; align-items: center; gap: 6px; }

    #coins-hud { color: #b8860b; }

    canvas {
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      background: transparent;
      cursor: pointer;
      display: block;
      -webkit-tap-highlight-color: transparent;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #message-box {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    #message-box h2 { font-size: 2.2rem; color: #c0392b; margin-bottom: 10px; }
    #message-box p  { font-size: 1.1rem; color: #555; margin-bottom: 20px; }
    #message-box button {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: #fff;
      border: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.1s;
    }
    #message-box button:hover { transform: scale(1.07); }

    #instructions {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #666;
      background: rgba(255,255,255,0.6);
      border-radius: 10px;
      padding: 6px 16px;
    }

    #pause-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.92);
      border: 2px solid #c0392b;
      color: #c0392b;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.1s, background 0.1s, color 0.1s;
      display: none;
    }
    #pause-btn:hover { background: #c0392b; color: #fff; transform: scale(1.07); }

    #shop-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: linear-gradient(135deg, #f39c12, #e67e22);
      border: none;
      color: #fff;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.1s, filter 0.1s;
      box-shadow: 0 2px 8px rgba(243,156,18,0.4);
    }
    #shop-btn:hover { transform: scale(1.07); filter: brightness(1.1); }

    #top-btn {
      position: absolute;
      top: 54px;
      right: 10px;
      background: linear-gradient(135deg, #f1c40f, #d4a017);
      border: none;
      color: #1a1a2e;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.1s, filter 0.1s;
      box-shadow: 0 2px 8px rgba(241,196,15,0.4);
    }
    #top-btn:hover { transform: scale(1.07); filter: brightness(1.1); }

    /* ── Shop overlay ───────────────────────────────────────────────────── */
    #shop-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadein 0.2s ease;
    }
    @keyframes fadein { from { opacity:0 } to { opacity:1 } }

    #shop-panel {
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      border: 2px solid rgba(255,215,0,0.3);
      border-radius: 24px;
      width: min(500px, 96vw);
      max-height: 90vh;
      overflow-y: auto;
      padding: 0 0 20px 0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,215,0,0.1);
    }
    #shop-panel::-webkit-scrollbar { width: 6px; }
    #shop-panel::-webkit-scrollbar-track { background: transparent; }
    #shop-panel::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 3px; }

    #shop-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 0;
      background: linear-gradient(160deg, #1a1a2e, #16213e);
      border-radius: 24px 24px 0 0;
      z-index: 1;
    }

    #shop-header h2 {
      font-size: 1.4rem;
      color: #ffd700;
      text-shadow: 0 0 12px rgba(255,215,0,0.5);
    }

    #shop-coins-info {
      font-size: 1rem;
      font-weight: bold;
      color: #ffd700;
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 20px;
      padding: 4px 12px;
    }

    #shop-close-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #shop-close-btn:hover { background: rgba(255,255,255,0.25); }

    #free-skin-bar {
      margin: 14px 20px 0;
      background: rgba(255,215,0,0.08);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 14px;
      padding: 10px 14px;
    }

    #free-skin-label {
      font-size: 0.85rem;
      color: #ffd700;
      margin-bottom: 7px;
      display: flex;
      justify-content: space-between;
    }

    #purchase-progress-wrap {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }

    #purchase-progress {
      height: 100%;
      background: linear-gradient(90deg, #f39c12, #ffd700);
      border-radius: 10px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(255,215,0,0.5);
    }

    #owned-info {
      margin: 10px 20px 4px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
    }

    #skin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 10px 14px 0;
    }

    .skin-card {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
    }
    .skin-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.25); }
    .skin-card.owned  { border-color: rgba(39,174,96,0.5); }
    .skin-card.active { border-color: #ffd700; box-shadow: 0 0 12px rgba(255,215,0,0.3); }
    .skin-card.locked { opacity: 0.55; }

    .skin-preview {
      border-radius: 8px;
      display: block;
    }

    .skin-tier-badge {
      font-size: 0.62rem;
      font-weight: bold;
      color: #fff;
      border-radius: 20px;
      padding: 2px 8px;
      width: 100%;
      text-align: center;
    }

    .skin-name {
      font-size: 0.78rem;
      font-weight: bold;
      color: #fff;
      text-align: center;
    }
    .skin-card.locked .skin-name { color: rgba(255,255,255,0.5); }

    .skin-price {
      font-size: 0.75rem;
      color: #ffd700;
    }

    .skin-btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 5px 4px;
      font-size: 0.72rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, filter 0.1s;
    }
    .skin-btn:hover:not(:disabled) { transform: scale(1.04); filter: brightness(1.1); }
    .skin-btn:disabled { cursor: default; opacity: 0.7; }

    .btn-buy   { background: linear-gradient(135deg, #27ae60, #1e8449); color: #fff; }
    .btn-equip { background: linear-gradient(135deg, #2980b9, #1a5276); color: #fff; }
    .btn-active { background: linear-gradient(135deg, #ffd700, #e67e22); color: #1a1a2e; }
    .btn-locked { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }

    /* ── Leaderboard overlay ────────────────────────────────────────────── */
    #leaderboard-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadein 0.2s ease;
    }

    #leaderboard-panel {
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      border: 2px solid rgba(255,215,0,0.3);
      border-radius: 24px;
      width: min(420px, 96vw);
      max-height: 90vh;
      overflow-y: auto;
      padding: 0 0 20px 0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,215,0,0.1);
    }

    #leaderboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 0;
      background: linear-gradient(160deg, #1a1a2e, #16213e);
      border-radius: 24px 24px 0 0;
      z-index: 1;
    }

    #leaderboard-header h2 {
      font-size: 1.3rem;
      color: #ffd700;
      text-shadow: 0 0 12px rgba(255,215,0,0.5);
    }

    #leaderboard-close-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #leaderboard-close-btn:hover { background: rgba(255,255,255,0.25); }

    #leaderboard-name-form {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 14px 20px 0;
      background: rgba(255,215,0,0.08);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 14px;
      padding: 10px 14px;
    }

    #leaderboard-name-form label {
      font-size: 0.85rem;
      color: #ffd700;
      white-space: nowrap;
    }

    #leaderboard-name-input {
      flex: 1;
      min-width: 0;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      padding: 7px 10px;
      font-size: 0.9rem;
    }
    #leaderboard-name-input:focus { outline: none; border-color: #ffd700; }

    #leaderboard-name-save {
      background: linear-gradient(135deg, #27ae60, #1e8449);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.1s, filter 0.1s;
    }
    #leaderboard-name-save:hover { transform: scale(1.05); filter: brightness(1.1); }

    #leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px 20px 0;
    }

    .leaderboard-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 8px 12px;
    }

    .leaderboard-rank {
      font-weight: bold;
      color: #ffd700;
      width: 28px;
      text-align: center;
    }

    .leaderboard-name {
      flex: 1;
      color: #fff;
      font-size: 0.88rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leaderboard-score {
      font-weight: bold;
      color: #ffd700;
      font-size: 0.88rem;
    }

    .leaderboard-empty {
      color: rgba(255,255,255,0.55);
      font-size: 0.85rem;
      text-align: center;
      padding: 20px 0;
    }

    /* ── Toast notification ─────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #ffd700;
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 20px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      z-index: 200;
      transition: transform 0.3s ease;
      pointer-events: none;
      text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Shop tabs ──────────────────────────────────────────────────────────── */
    #shop-tabs {
      display: flex;
      padding: 12px 20px 0;
      gap: 8px;
    }

    .shop-tab {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
    }
    .shop-tab.active {
      background: rgba(255,215,0,0.15);
      border-color: rgba(255,215,0,0.5);
      color: #ffd700;
    }
    .shop-tab:hover:not(.active) {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
    }

    #burger-purchase-progress-wrap {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }

    #burger-purchase-progress {
      height: 100%;
      background: linear-gradient(90deg, #e67e22, #ffd700);
      border-radius: 10px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(255,165,0,0.5);
    }

    /* ── Mobile full-screen ─────────────────────────────────────────────── */
    @media (max-width: 640px) {
      body {
        justify-content: flex-start;
        height: 100dvh;
        padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
      }

      h1 { display: none; }
      #instructions { display: none; }

      #hud {
        width: 100%;
        border-radius: 0;
        padding: 6px 12px;
        margin: 0;
        gap: 10px;
        font-size: 0.85rem;
      }

      #game-container {
        flex: 1;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      canvas {
        border-radius: 0 !important;
        box-shadow: none !important;
        width: min(100vw, calc((100dvh - 50px) * 480 / 560)) !important;
        aspect-ratio: 480 / 560;
        height: auto !important;
      }

      /* ── Shop mobile ── */
      #shop-overlay {
        align-items: flex-end;
      }

      #shop-panel {
        width: 100vw;
        max-width: 100vw;
        max-height: 92dvh;
        border-radius: 20px 20px 0 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
      }

      #shop-header {
        padding: 14px 14px 10px;
        border-radius: 20px 20px 0 0;
      }

      #shop-header h2 { font-size: 1.1rem; }
      #shop-coins-info { font-size: 0.85rem; padding: 3px 10px; }
      #shop-close-btn { width: 28px; height: 28px; font-size: 0.85rem; }

      #shop-tabs { padding: 8px 12px 0; gap: 6px; }
      .shop-tab { padding: 6px 8px; font-size: 0.78rem; }

      #skin-grid,
      #burger-skin-grid,
      #pizza-skin-grid {
        grid-template-columns: repeat(4, 1fr) !important;
        gap: 7px !important;
        padding: 8px 10px 0 !important;
      }

      .skin-card { padding: 5px; gap: 3px; border-radius: 10px; }

      .skin-preview { width: 100% !important; height: auto !important; aspect-ratio: 88/52; }

      .skin-tier-badge { font-size: 0.52rem; padding: 1px 4px; }
      .skin-name { font-size: 0.65rem; }
      .skin-price { font-size: 0.62rem; }
      .skin-btn { padding: 4px 2px; font-size: 0.6rem; border-radius: 6px; }

      #owned-info,
      #burger-owned-info,
      #pizza-owned-info { margin: 6px 12px 2px; font-size: 0.75rem; }

      #free-skin-bar { margin: 8px 12px 0; padding: 8px 10px; }
      #free-skin-label { font-size: 0.78rem; }
    }
  </style>
</head>
<body>

<h1>🍔 המבורגר נופל! 🍔</h1>

<div id="hud">
  <span>⭐ תפוס: <b id="score-display">0</b></span>
  <span>❤️ חיים: <b id="lives-display">3</b></span>
  <span>⚡ רמה: <b id="level-display">1</b></span>
  <span id="coins-hud">🪙 מטבעות: <b id="coins-display">0</b></span>
</div>

<div id="game-container" style="position:relative;">
  <canvas id="gameCanvas" width="480" height="560"></canvas>

  <button id="pause-btn" onclick="togglePause()">⏸ השהה</button>
  <button id="shop-btn" onclick="openShop()">🛍️ חנות</button>
  <button id="top-btn" onclick="openLeaderboard()">🏆 טופ</button>

  <div id="overlay">
    <div id="message-box">
      <h2>🍔 המבורגר נופל!</h2>
      <p>הזז את הסל כדי לתפוס המבורגרים!<br>אל תפספס יותר מ-3 🍔</p>
      <button id="start-btn" onclick="startGame()">▶ התחל משחק</button>
    </div>
  </div>
</div>

<p id="instructions">🖱️ הזז את העכבר / 👆 גרור את האצבע כדי להזיז את הסל!</p>

<!-- Shop Modal -->
<div id="shop-overlay" style="display:none;" onclick="handleShopOverlayClick(event)">
  <div id="shop-panel">
    <div id="shop-header">
      <h2>🛍️ חנות</h2>
      <div id="shop-coins-info">🪙 <b id="shop-coins-val">0</b></div>
      <button id="shop-close-btn" onclick="closeShop()">✕</button>
    </div>

    <div id="shop-tabs">
      <button class="shop-tab active" id="tab-basket" onclick="switchShopTab('basket')">🧺 סל</button>
      <button class="shop-tab" id="tab-burger" onclick="switchShopTab('burger')">🍔 המבורגר</button>
      <button class="shop-tab" id="tab-pizza" onclick="switchShopTab('pizza')">🍕 פיצה</button>
      <button class="shop-tab" id="tab-salad" onclick="switchShopTab('salad')">🥗 סלט</button>
    </div>

    <!-- Basket skins panel -->
    <div id="panel-basket">
      <div id="owned-info">סקינים בבעלותך: <b id="owned-count">1</b></div>
      <div id="skin-grid"></div>
    </div>

    <!-- Burger skins panel -->
    <div id="panel-burger" style="display:none">
      <div id="burger-owned-info" style="margin:10px 20px 4px;font-size:0.82rem;color:rgba(255,255,255,0.55);">סקיני המבורגר שלך: <b id="burger-owned-count">1</b></div>
      <div id="burger-skin-grid" class="skin-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px 14px 0;"></div>
    </div>

    <!-- Pizza skins panel -->
    <div id="panel-pizza" style="display:none">
      <div id="pizza-owned-info" style="margin:10px 20px 4px;font-size:0.82rem;color:rgba(255,255,255,0.55);">סקיני הפיצה שלך: <b id="pizza-owned-count">1</b></div>
      <div id="pizza-skin-grid" class="skin-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px 14px 0;"></div>
    </div>

    <!-- Salad skins panel -->
    <div id="panel-salad" style="display:none">
      <div id="salad-owned-info" style="margin:10px 20px 4px;font-size:0.82rem;color:rgba(255,255,255,0.55);">סקיני הסלט שלך: <b id="salad-owned-count">1</b></div>
      <div id="salad-skin-grid" class="skin-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px 14px 0;"></div>
    </div>
  </div>
</div>

<!-- Leaderboard Modal -->
<div id="leaderboard-overlay" style="display:none;" onclick="handleLeaderboardOverlayClick(event)">
  <div id="leaderboard-panel">

<script>
// ── API client ────────────────────────────────────────────────────────────────
// The game no longer talks to Supabase directly (no hardcoded URL/anon key).
// It calls the trusted Think-Fast API over HTTPS with an X-Player-Id header.
// API_BASE is '' for the web build (same origin); the Capacitor app can set
// window.THINKFAST_API_BASE to the deployed origin before this script runs.
const API_BASE = (window.THINKFAST_API_BASE || '').replace(/\/$/, '');
const API_CLIENT = window.THINKFAST_CLIENT || 'web';

function getPlayerId() {
  let id = localStorage.getItem('thinkFastPlayerId');
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem('thinkFastPlayerId', id);
    console.log('[API] נוצר player_id חדש:', id);
  }
  return id;
}

function apiHeaders() {
  return { 'Content-Type': 'application/json', 'X-Player-Id': getPlayerId() };
}

// GET /api/v1/progress → returns the camelCase progress object, or null on error.
async function apiGetProgress() {
  try {
    const res = await fetch(`${API_BASE}/api/v1/progress`, {
      method: 'GET',
      headers: apiHeaders(),
    });
    if (!res.ok) {
      console.error('[API] שגיאה בטעינה:', res.status);
      return null;
    }
    const json = await res.json();
    console.log('[API] נטענו נתונים בהצלחה:', json);
    return json.progress || null;
  } catch (e) {
    console.error('[API] טעינה נכשלה (offline?):', e);
    return null;
  }
}

// PUT /api/v1/progress → upsert progress. The server validates and sets updated_at.
// Pass { keepalive: true } when saving during page exit so the browser doesn't
// cancel the request mid-flight.
async function apiSaveProgress(shopData, opts = {}) {
  const payload = {
    coins: shopData.coins,
    ownedSkins: shopData.ownedSkins,
    activeSkin: shopData.activeSkin,
    purchaseCount: shopData.purchaseCount,
    ownedBurgerSkins: shopData.ownedBurgerSkins,
    activeBurgerSkin: shopData.activeBurgerSkin,
    burgerPurchaseCount: shopData.burgerPurchaseCount,
    ownedPizzaSkins: shopData.ownedPizzaSkins,
    activePizzaSkin: shopData.activePizzaSkin,
    pizzaPurchaseCount: shopData.pizzaPurchaseCount,
    ownedSaladSkins: shopData.ownedSaladSkins,
    activeSaladSkin: shopData.activeSaladSkin,
    saladPurchaseCount: shopData.saladPurchaseCount,
    displayName: shopData.displayName ?? null,
  };
  try {
    const res = await fetch(`${API_BASE}/api/v1/progress`, {
      method: 'PUT',
      headers: apiHeaders(),
      body: JSON.stringify(payload),
      keepalive: opts.keepalive === true,
    });
    if (!res.ok) {
      console.error('[API] שגיאה בשמירה:', res.status);
    } else {
      console.log('[API] נשמר בהצלחה');
    }
  } catch (e) {
    console.error('[API] שמירה נכשלה (offline?):', e);
  }
}

// POST /api/v1/sessions → record a completed game (activity tracking).
// Pass { keepalive: true } when recording during page exit.
async function apiPostSession(stats, opts = {}) {
  try {
    const res = await fetch(`${API_BASE}/api/v1/sessions`, {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify({ ...stats, client: API_CLIENT }),
      keepalive: opts.keepalive === true,
    });
    if (!res.ok) {
      console.error('[API] שגיאה ברישום משחק:', res.status);
      return null;
    }
    return await res.json();
  } catch (e) {
    console.error('[API] רישום משחק נכשל (offline?):', e);
    return null;
  }
}

window._apiSaveProgress = apiSaveProgress;
window._apiPostSession = apiPostSession;
window._apiReady = false;

// Load-on-start + the local-vs-remote "higher coins wins" merge (kept client-side
// against GET /progress, as before). localStorage stays as the offline cache.
apiGetProgress().then(remote => {
  if (remote) {
    const local = JSON.parse(localStorage.getItem('thinkFastShop') || 'null');
    if (!local || remote.coins >= local.coins) {
      console.log('[API] משתמש בנתוני שרת (מטבעות:', remote.coins, ')');
      Object.assign(window._pendingShopData || {}, remote);
      window._remoteShopData = remote;
    } else {
      console.log('[API] נתונים מקומיים חדשים יותר (מקומי:', local.coins, 'שרת:', remote.coins, ') — שומר מקומיים לשרת');
      apiSaveProgress(local);
    }
  }
  window._apiReady = true;
  console.log('[API] אתחול הושלם');
});
</script>

const levelEl = document.getElementById('level-display');

let score = 0, lives = 3, level = 1, missCount = 0;
// Per-run session counters (recorded to the API on game over).
let burgersCaught = 0, pizzasCaught = 0, saladsCaught = 0;
let coinsEarnedThisRun = 0, runStartTime = 0;
let running = false, paused = false, animId = null;
let burgers = [], pizzas = [], salads = [], particles = [], clouds = [], floatingTexts = [];
let spawnTimer = 0, spawnInterval = 90;
let pizzaSpawnTimer = 0, pizzaSpawnInterval = 210;
let saladSpawnTimer = 0, saladSpawnInterval = 180;
let frameCount = 0;

// ── Basket ────────────────────────────────────────────────────────────────────
const BASKET_W = 90, BASKET_H = 44, BASKET_Y = H - 48;
let basketX = W / 2;

function clampBasket(x) {
  return Math.max(BASKET_W / 2, Math.min(W - BASKET_W / 2, x));
}

// ── Input ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    keys[e.key] = true;
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => {
  keys[e.key] = false;
});

canvas.addEventListener('mousemove', e => {
  if (!running) return;
  const rect = canvas.getBoundingClientRect();
  basketX = clampBasket((e.clientX - rect.left) * (W / rect.width));
});

canvas.addEventListener('touchmove', e => {
  if (!running) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  basketX = clampBasket((e.touches[0].clientX - rect.left) * (W / rect.width));
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  if (!running) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  basketX = clampBasket((e.touches[0].clientX - rect.left) * (W / rect.width));
}, { passive: false });

// ── Skin Drawing ──────────────────────────────────────────────────────────────
function drawBasketSkin(c, x, y, w, h, skinId) {
  const hw = w / 2, hh = h / 2;
  c.save();

  function trapezoid() {
    c.beginPath();
    c.moveTo(x - hw, y - hh);
    c.lineTo(x + hw, y - hh);
    c.lineTo(x + hw - 8 * (w / 90), y + hh);
    c.lineTo(x - hw + 8 * (w / 90), y + hh);
    c.closePath();
  }

  function weaveLines(strokeColor, lw) {
    c.strokeStyle = strokeColor;
    c.lineWidth = lw || 1.5;
    const sc = w / 90;
    for (let i = 1; i < 3; i++) {
      const ly = y - hh + (h / 3) * i, inset = (i / 3) * 8 * sc;
      c.beginPath();
      c.moveTo(x - hw + inset, ly);
      c.lineTo(x + hw - inset, ly);
      c.stroke();
    }
  }

  function rim(fill, stroke) {
    c.fillStyle = fill;
    c.beginPath();
    c.ellipse(x, y - hh, hw, 7 * (h / 44), 0, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = stroke;
    c.lineWidth = 2;
    c.stroke();
  }

  switch (skinId) {

    case 'classic':
      c.fillStyle = '#c8860a';
      trapezoid(); c.fill();
      weaveLines('#a06808');
      rim('#e8a020', '#c8860a');
      break;

    case 'cool': {
      const g = c.createLinearGradient(x - hw, y - hh, x + hw, y + hh);
      g.addColorStop(0, '#2980b9'); g.addColorStop(1, '#1a5276');
      c.fillStyle = g; trapezoid(); c.fill();
      weaveLines('#5dade2');
      const rg = c.createLinearGradient(x - hw, 0, x + hw, 0);
      rg.addColorStop(0, '#5dade2'); rg.addColorStop(0.5, '#aed6f1'); rg.addColorStop(1, '#5dade2');
      rim(rg, '#2980b9');
      break;
    }

    case 'fire': {
      c.shadowColor = '#ff6b1a'; c.shadowBlur = 14;
      const g = c.createLinearGradient(x, y - hh, x, y + hh);
      g.addColorStop(0, '#e74c3c'); g.addColorStop(1, '#7b241c');
      c.fillStyle = g; trapezoid(); c.fill();
      c.shadowBlur = 0;
      weaveLines('#f0b27a');
      c.shadowColor = '#ff6b1a'; c.shadowBlur = 8;
      rim('#e74c3c', '#f0b27a');
      c.shadowBlur = 0;
      break;
    }

    case 'forest': {
      const g = c.createLinearGradient(x, y - hh, x, y + hh);
      g.addColorStop(0, '#27ae60'); g.addColorStop(1, '#145a32');
      c.fillStyle = g; trapezoid(); c.fill();
      weaveLines('#82e0aa');
      const rg = c.createLinearGradient(x - hw, 0, x + hw, 0);
      rg.addColorStop(0, '#82e0aa'); rg.addColorStop(0.5, '#abebc6'); rg.addColorStop(1, '#82e0aa');
      rim(rg, '#1e8449');
      break;
    }

    case 'ocean': {
      const g = c.createLinearGradient(x, y - hh, x, y + hh);
      g.addColorStop(0, '#1abc9c'); g.addColorStop(0.5, '#0e8a7a'); g.addColorStop(1, '#0d6e62');
      c.fillStyle = g; trapezoid(); c.fill();
      c.save();
      trapezoid(); c.clip();
      c.strokeStyle = 'rgba(255,255,255,0.35)'; c.lineWidth = 1.5;
      for (let i = 1; i < 4; i++) {
        const ly = y - hh + (h / 4) * i;
        c.beginPath();
        for (let wx = -hw; wx <= hw; wx += 4) {
          const wy = Math.sin((wx + i * 18) * 0.22) * 2.5;
          wx === -hw ? c.moveTo(x + wx, ly + wy) : c.lineTo(x + wx, ly + wy);
        }
        c.stroke();
      }
      c.restore();
      const rg = c.createLinearGradient(x - hw, 0, x + hw, 0);
      rg.addColorStop(0, '#45b39d'); rg.addColorStop(0.5, '#a3e4d7'); rg.addColorStop(1, '#45b39d');
      rim(rg, '#0e8a7a');
      break;
    }

    case 'galaxy': {
      const g = c.createLinearGradient(x, y - hh, x, y + hh);
      g.addColorStop(0, '#2c0d5e'); g.addColorStop(1, '#0d0a2e');
      c.fillStyle = g; trapezoid(); c.fill();
      c.save();
      trapezoid(); c.clip();
      c.fillStyle = 'rgba(255,255,255,0.9)';
      [[-22,6],[8,-6],[28,10],[-12,18],[18,3],[-28,13],[4,22],[32,-3],[-8,28],[24,18],[-18,-4],[14,13]].forEach(([sx, sy]) => {
        c.beginPath(); c.arc(x + sx * (w/90), y + sy * (h/44), 1, 0, Math.PI * 2); c.fill();
      });
      c.restore();
      c.shadowColor = '#a855f7'; c.shadowBlur = 8;
      const rg = c.createLinearGradient(x - hw, 0, x + hw, 0);
      rg.addColorStop(0, '#a855f7'); rg.addColorStop(0.5, '#d8b4fe'); rg.addColorStop(1, '#a855f7');
      rim(rg, '#7c3aed');
      c.shadowBlur = 0;
      break;
    }

    case 'gold': {
      c.shadowColor = 'rgba(255,215,0,0.7)'; c.shadowBlur = 12;
      const g = c.createLinearGradient(x - hw, y - hh, x + hw, y + hh);
      g.addColorStop(0, '#ffd700'); g.addColorStop(0.3, '#ffec6e');
      g.addColorStop(0.6, '#d4a000'); g.addColorStop(1, '#b8860b');
      c.fillStyle = g; trapezoid(); c.fill();
      c.shadowBlur = 0;
      weaveLines('rgba(255,255,255,0.55)');
      c.shadowColor = '#ffd700'; c.shadowBlur = 10;
      const rg = c.createLinearGradient(x - hw, 0, x + hw, 0);
      rg.addColorStop(0, '#ffd700'); rg.addColorStop(0.5, '#fffacd'); rg.addColorStop(1, '#ffd700');
      rim(rg, '#b8860b');
      c.shadowBlur = 0;
      break;
    }

    case 'rainbow': {
      const g = c.createLinearGradient(x - hw, 0, x + hw, 0);
      g.addColorStop(0,    '#ff0000'); g.addColorStop(0.17, '#ff8800');
      g.addColorStop(0.33, '#ffff00'); g.addColorStop(0.5,  '#00ff00');

      g.addColorStop(1,    '#ff00ff');

    case 'crystal': {

      c.fillStyle = g; trapezoid(); c.fill();
      c.shadowBlur = 0;
      c.strokeStyle = 'rgba(255,255,255,0.65)'; c.lineWidth = 1;
      const sc2 = w / 90;
      c.beginPath(); c.moveTo(x, y - hh); c.lineTo(x - hw + 12*sc2, y + hh); c.stroke();
      c.beginPath(); c.moveTo(x, y - hh); c.lineTo(x + hw - 12*sc2, y + hh); c.stroke();
      c.strokeStyle = 'rgba(255,255,255,0.45)'; c.lineWidth = 1.5;
      c.beginPath(); c.moveTo(x - hw * 0.5, y - hh); c.lineTo(x - hw, y - hh * 0.1); c.stroke();
      c.shadowColor = '#ffffff'; c.shadowBlur = 14;
      rim('rgba(240,248,255,0.92)', 'rgba(173,216,230,0.7)');
      c.shadowBlur = 0;
      break;
    }

    case 'dragon': {
      const g = c.createLinearGradient(x, y - hh, x, y + hh);
      g.addColorStop(0, '#1a4a1a'); g.addColorStop(0.5, '#0d2e0d'); g.addColorStop(1, '#2d1a0a');
      c.fillStyle = g; trapezoid(); c.fill();
      c.save();
      trapezoid(); c.clip();
      c.strokeStyle = 'rgba(100,200,100,0.45)'; c.lineWidth = 1;
      const rows = 3, cols = 5;
      const sw = w / cols, sh = h / rows;
      for (let r = 0; r < rows; r++) {
        for (let cl = 0; cl < cols; cl++) {
          const off = r % 2 === 0 ? 0 : sw / 2;
          c.beginPath();
          c.arc(x - hw + cl * sw + off + sw / 2, y - hh + r * sh + sh * 0.7, sw * 0.42, Math.PI * 1.15, Math.PI * 1.85);
          c.stroke();
        }
      }
      c.restore();
      c.shadowColor = '#228b22'; c.shadowBlur = 8;
      const rg = c.createLinearGradient(x - hw, 0, x + hw, 0);
      rg.addColorStop(0, '#228b22'); rg.addColorStop(0.5, '#32cd32'); rg.addColorStop(1, '#228b22');

    case 'neon': {

    case 'legendary': {

      const sc3 = w / 90;

// ── Shop Logic ────────────────────────────────────────────────────────────────
let shopPausedGame = false;

function openShop() {
  if (running && !paused) {
    togglePause();
    shopPausedGame = true;
  }
  activeShopTab = 'basket';
  document.getElementById('panel-basket').style.display = '';
  document.getElementById('panel-burger').style.display = 'none';
  document.getElementById('panel-pizza').style.display = 'none';
  document.getElementById('panel-salad').style.display = 'none';
  document.getElementById('tab-basket').className = 'shop-tab active';
  document.getElementById('tab-burger').className  = 'shop-tab';
  document.getElementById('tab-pizza').className   = 'shop-tab';
  document.getElementById('tab-salad').className   = 'shop-tab';
  renderShop();
  document.getElementById('shop-overlay').style.display = 'flex';
}

function closeShop() {
  document.getElementById('shop-overlay').style.display = 'none';
  if (shopPausedGame && paused) {
    togglePause();
  }
  shopPausedGame = false;
}

function handleShopOverlayClick(e) {
  if (e.target === document.getElementById('shop-overlay')) closeShop();
}

// ── Leaderboard Logic ─────────────────────────────────────────────────────────
let leaderboardPausedGame = false;

function openLeaderboard() {
  if (running && !paused) {
    togglePause();
    leaderboardPausedGame = true;
  }
  document.getElementById('leaderboard-name-input').value = shopData.displayName || '';
  document.getElementById('leaderboard-overlay').style.display = 'flex';
  fetchLeaderboard();
}

function closeLeaderboard() {
  document.getElementById('leaderboard-overlay').style.display = 'none';
  if (leaderboardPausedGame && paused) {
    togglePause();
  }
  leaderboardPausedGame = false;
}

function handleLeaderboardOverlayClick(e) {
  if (e.target === document.getElementById('leaderboard-overlay')) closeLeaderboard();
}

// Any player can type any name they like — there's no signup/verification step,
// the box is just a free-text label attached to their (anonymous) player id.
function saveDisplayName() {
  const input = document.getElementById('leaderboard-name-input');
  const name = input.value.trim().slice(0, 64);
  shopData.displayName = name || null;
  saveShop();
  showToast('✅ השם נשמר!');
  fetchLeaderboard();
}

async function fetchLeaderboard() {
  const list = document.getElementById('leaderboard-list');
  list.innerHTML = '<div class="leaderboard-empty">טוען...</div>';
  try {
    const res = await fetch(`${API_BASE}/api/v1/leaderboard`);
    if (!res.ok) throw new Error('bad status ' + res.status);
    const data = await res.json();
    renderLeaderboard(data.entries || []);
  } catch (e) {
    console.error('[API] טעינת טבלת שיאים נכשלה:', e);
    list.innerHTML = '<div class="leaderboard-empty">שגיאה בטעינת טבלת השיאים</div>';
  }
}

function renderLeaderboard(entries) {
  const list = document.getElementById('leaderboard-list');
  if (!entries.length) {
    list.innerHTML = '<div class="leaderboard-empty">אין עדיין שיאים — היה הראשון! 🍔</div>';
    return;
  }
  const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };
  list.innerHTML = entries.map(e => `
    <div class="leaderboard-row">
      <span class="leaderboard-rank">${medals[e.rank] || e.rank}</span>
      <span class="leaderboard-name">${escapeHtml(e.displayName)}</span>
      <span class="leaderboard-score">⭐ ${e.score}</span>
    </div>
  `).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderShop() {
  const owned = shopData.ownedSkins.length;
  document.getElementById('shop-coins-val').textContent = shopData.coins;
  document.getElementById('owned-count').textContent = owned;
  const grid = document.getElementById('skin-grid');
  grid.innerHTML = '';

  SKINS.forEach(skin => {
    const isOwned  = shopData.ownedSkins.includes(skin.id);
    const isActive = shopData.activeSkin === skin.id;
    const isLocked = owned < skin.requireOwned;
    const canAfford = shopData.coins >= skin.price;

    let cardClass = 'skin-card';
    if (isActive) cardClass += ' active';
    else if (isOwned) cardClass += ' owned';
    else if (isLocked) cardClass += ' locked';

    const tierColor = TIER_COLORS[skin.tier];
    const tierLabel = TIER_STARS[skin.tier] ? TIER_STARS[skin.tier] + ' ' : '';

    let btnHtml;
    if (isActive) {
      btnHtml = `<button class="skin-btn btn-active" disabled>✓ פעיל</button>`;
    } else if (isOwned) {
      btnHtml = `<button class="skin-btn btn-equip" onclick="equipSkin('${skin.id}')">לבש</button>`;
    } else if (isLocked) {
      btnHtml = `<button class="skin-btn btn-locked" disabled>🔒 צריך ${skin.requireOwned}</button>`;
    } else {
      btnHtml = `<button class="skin-btn btn-buy" onclick="buySkin('${skin.id}')" ${canAfford ? '' : 'disabled style="opacity:0.45"'}>🪙 ${skin.price}</button>`;
    }

    const priceInfo = isOwned ? '' : `<div style="font-size:0.7rem;color:rgba(255,255,255,0.45);margin-bottom:2px;">🪙 ${skin.price}</div>`;

    grid.innerHTML += `
      <div class="${cardClass}">
        <canvas class="skin-preview" id="preview-${skin.id}" width="88" height="52"></canvas>
        <div class="skin-tier-badge" style="background:${tierColor}">${tierLabel}${TIER_LABELS[skin.tier]}</div>
        <div class="skin-name">${skin.emoji} ${skin.name}</div>
        ${priceInfo}
        ${btnHtml}
      </div>`;
  });

  requestAnimationFrame(drawSkinPreviews);
}

function drawSkinPreviews() {
  SKINS.forEach(skin => {
    const pc = document.getElementById(`preview-${skin.id}`);
    if (!pc) return;
    const pctx = pc.getContext('2d');
    const pw = pc.width, ph = pc.height;
    pctx.clearRect(0, 0, pw, ph);

    const isLocked = shopData.ownedSkins.length < skin.requireOwned;
    const bg = pctx.createLinearGradient(0, 0, 0, ph);
    bg.addColorStop(0, isLocked ? '#1a1a2e' : '#d4ecf7');
    bg.addColorStop(1, isLocked ? '#0d0a2e' : '#c1dff0');
    pctx.fillStyle = bg;
    pctx.roundRect(0, 0, pw, ph, 6);
    pctx.fill();

    const cx = pw / 2, cy = ph * 0.65;
    const bw = 70, bh = 34;

    pctx.fillStyle = 'rgba(0,0,0,0.1)';
    pctx.beginPath();
    pctx.ellipse(cx, cy + bh / 2 + 3, bw * 0.45, 5, 0, 0, Math.PI * 2);
    pctx.fill();

    if (isLocked) {
      pctx.fillStyle = 'rgba(255,255,255,0.15)';
      pctx.beginPath();
      pctx.moveTo(cx - bw/2, cy - bh/2);
      pctx.lineTo(cx + bw/2, cy - bh/2);
      pctx.lineTo(cx + bw/2 - 6, cy + bh/2);
      pctx.lineTo(cx - bw/2 + 6, cy + bh/2);
      pctx.closePath(); pctx.fill();
      pctx.fillStyle = 'rgba(255,255,255,0.3)';
      pctx.font = 'bold 18px Arial';
      pctx.textAlign = 'center';
      pctx.fillText('🔒', cx, cy + 7);

function renderBurgerShop() {
  const owned = shopData.ownedBurgerSkins.length;
  document.getElementById('burger-owned-count').textContent = owned;
  const grid = document.getElementById('burger-skin-grid');
  grid.innerHTML = '';

  BURGER_SKINS.forEach(skin => {
    const isOwned  = shopData.ownedBurgerSkins.includes(skin.id);
    const isActive = shopData.activeBurgerSkin === skin.id;
    const isLocked = owned < skin.requireOwned;
    const canAfford = shopData.coins >= skin.price;

    let cardClass = 'skin-card';
    if (isActive) cardClass += ' active';
    else if (isOwned) cardClass += ' owned';
    else if (isLocked) cardClass += ' locked';

    const tierColor = TIER_COLORS[skin.tier];
    const tierLabel = TIER_STARS[skin.tier] ? TIER_STARS[skin.tier] + ' ' : '';

    let btnHtml;
    if (isActive) {
      btnHtml = `<button class="skin-btn btn-active" disabled>✓ פעיל</button>`;
    } else if (isOwned) {
      btnHtml = `<button class="skin-btn btn-equip" onclick="equipBurgerSkin('${skin.id}')">לבש</button>`;
    } else if (isLocked) {
      btnHtml = `<button class="skin-btn btn-locked" disabled>🔒 צריך ${skin.requireOwned}</button>`;
    } else {
      btnHtml = `<button class="skin-btn btn-buy" onclick="buyBurgerSkin('${skin.id}')" ${canAfford ? '' : 'disabled style="opacity:0.45"'}>🪙 ${skin.price}</button>`;
    }

    grid.innerHTML += `
      <div class="${cardClass}">

        <div class="skin-tier-badge" style="background:${tierColor}">${tierLabel}${TIER_LABELS[skin.tier]}</div>

        ${priceInfo}
        ${btnHtml}
      </div>`;
  });

  requestAnimationFrame(drawBurgerSkinPreviews);
}

function drawBurgerSkinPreviews() {
  BURGER_SKINS.forEach(skin => {
    const pc = document.getElementById(`bpreview-${skin.id}`);
    if (!pc) return;
    const pctx = pc.getContext('2d');
    const pw = pc.width, ph = pc.height;
    pctx.clearRect(0, 0, pw, ph);

    const isLocked = shopData.ownedBurgerSkins.length < skin.requireOwned;
    const bg = pctx.createLinearGradient(0, 0, 0, ph);
    bg.addColorStop(0, isLocked ? '#1a1a2e' : '#d4ecf7');
    bg.addColorStop(1, isLocked ? '#0d0a2e' : '#c1dff0');
    pctx.fillStyle = bg;
    if (pctx.roundRect) { pctx.roundRect(0, 0, pw, ph, 6); pctx.fill(); }
    else { pctx.fillRect(0, 0, pw, ph); }

    if (isLocked) {
      pctx.fillStyle = 'rgba(255,255,255,0.3)';
      pctx.font = 'bold 18px Arial';
      pctx.textAlign = 'center';
      pctx.fillText('🔒', pw / 2, ph / 2 + 7);
    } else if (skin.id.includes('_b')) {
      pctx.font = `bold ${Math.floor(ph * 0.62)}px Arial`;
      pctx.textAlign = 'center';
      pctx.textBaseline = 'middle';
      pctx.fillText(skin.emoji, pw / 2, ph / 2);
    } else {
      drawBurger(pctx, pw / 2, ph * 0.55, 28, false, skin.id);
    }
  });
}

// ── Clouds ───────────────────────────────────────────────────────────────────
function initClouds() {
  clouds = [];
  for (let i = 0; i < 5; i++) {
    clouds.push({ x: Math.random() * W, y: 20 + Math.random() * 120,
      r: 30 + Math.random() * 30, speed: 0.2 + Math.random() * 0.3 });
  }
}

function updateClouds() {
  clouds.forEach(c => { c.x += c.speed; if (c.x - c.r > W) c.x = -c.r; });
}

function drawCloud(c) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(c.x,            c.y,           c.r,       0, Math.PI * 2);
  ctx.arc(c.x + c.r*0.8, c.y - c.r*0.3, c.r*0.7,   0, Math.PI * 2);
  ctx.arc(c.x - c.r*0.8, c.y - c.r*0.2, c.r*0.6,   0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── Burger drawing ────────────────────────────────────────────────────────────
function drawBurger(c, x, y, size, highlight, skinId) {
  const s = size / 40;
  c.save();
  c.translate(x, y);

  switch (skinId) {

    case 'spicy': {
      if (highlight) { c.shadowColor = '#ff3300'; c.shadowBlur = 22; }
      // top bun – dark red
      c.fillStyle = '#b52200';
      c.beginPath(); c.ellipse(0, -18*s, 20*s, 12*s, 0, Math.PI, 0); c.fill();
      // seeds – orange
      c.fillStyle = '#ff8800';
      [[-8*s,-22*s],[0,-24*s],[8*s,-22*s]].forEach(([sx,sy]) => {
        c.beginPath(); c.ellipse(sx, sy, 2.5*s, 1.5*s, 0.3, 0, Math.PI*2); c.fill();
      });
      // hot pepper "lettuce"
      c.fillStyle = '#cc1100';
      c.beginPath(); c.ellipse(0, -8*s, 22*s, 6*s, 0, 0, Math.PI*2); c.fill();
      // dark charred patty
      c.fillStyle = '#3a1500';
      c.beginPath(); c.ellipse(0, -2*s, 20*s, 5*s, 0, 0, Math.PI*2); c.fill();
      // orange pepper cheese
      c.fillStyle = '#ff6600';
      c.beginPath(); c.ellipse(0, 4*s, 22*s, 4*s, 0, 0, Math.PI*2); c.fill();
      // bottom bun
      c.shadowColor = '#ff4400'; c.shadowBlur = 10;
      c.fillStyle = '#b52200';
      c.beginPath(); c.ellipse(0, 10*s, 21*s, 8*s, 0, 0, Math.PI*2); c.fill();
      break;
    }

    case 'veggie': {
      if (highlight) { c.shadowColor = '#00ff88'; c.shadowBlur = 18; }
      // top bun – light green
      c.fillStyle = '#7cb518';
      c.beginPath(); c.ellipse(0, -18*s, 20*s, 12*s, 0, Math.PI, 0); c.fill();
      // white seeds
      c.fillStyle = '#ffffff';
      [[-8*s,-22*s],[0,-24*s],[8*s,-22*s]].forEach(([sx,sy]) => {
        c.beginPath(); c.ellipse(sx, sy, 2.5*s, 1.5*s, 0.3, 0, Math.PI*2); c.fill();
      });
      // thick dark lettuce
      c.fillStyle = '#2e7d32';
      c.beginPath(); c.ellipse(0, -8*s, 22*s, 7*s, 0, 0, Math.PI*2); c.fill();
      // portobello patty
      c.fillStyle = '#5d4037';
      c.beginPath(); c.ellipse(0, -2*s, 20*s, 5*s, 0, 0, Math.PI*2); c.fill();
      // avocado "cheese"
      c.fillStyle = '#aed661';
      c.beginPath(); c.ellipse(0, 4*s, 22*s, 4*s, 0, 0, Math.PI*2); c.fill();
      // bottom bun
      c.fillStyle = '#7cb518';
      c.beginPath(); c.ellipse(0, 10*s, 21*s, 8*s, 0, 0, Math.PI*2); c.fill();
      break;
    }

    case 'gold': {
      c.shadowColor = '#ffd700'; c.shadowBlur = 20;
      if (highlight) c.shadowBlur = 30;
      // top bun – gold
      c.fillStyle = '#ffd700';
      c.beginPath(); c.ellipse(0, -18*s, 20*s, 12*s, 0, Math.PI, 0); c.fill();
      // pearl seeds
      c.fillStyle = '#fffde7';
      [[-8*s,-22*s],[0,-24*s],[8*s,-22*s]].forEach(([sx,sy]) => {
        c.beginPath(); c.ellipse(sx, sy, 2.5*s, 1.5*s, 0.3, 0, Math.PI*2); c.fill();
      });
      // gold "lettuce"
      c.fillStyle = '#f9a825';
      c.beginPath(); c.ellipse(0, -8*s, 22*s, 6*s, 0, 0, Math.PI*2); c.fill();
      // gold patty
      c.fillStyle = '#e65100';
      c.beginPath(); c.ellipse(0, -2*s, 20*s, 5*s, 0, 0, Math.PI*2); c.fill();
      // light gold cheese
      c.fillStyle = '#fff176';
      c.beginPath(); c.ellipse(0, 4*s, 22*s, 4*s, 0, 0, Math.PI*2); c.fill();
      // bottom bun
      c.fillStyle = '#ffd700';
      c.beginPath(); c.ellipse(0, 10*s, 21*s, 8*s, 0, 0, Math.PI*2); c.fill();
      c.shadowBlur = 0;
      break;
    }

    case 'ocean': {
      if (highlight) { c.shadowColor = '#00bcd4'; c.shadowBlur = 18; }
      // top bun – ocean blue
      c.fillStyle = '#0288d1';
      c.beginPath(); c.ellipse(0, -18*s, 20*s, 12*s, 0, Math.PI, 0); c.fill();
      // foam seeds
      c.fillStyle = '#e0f7fa';
      [[-8*s,-22*s],[0,-24*s],[8*s,-22*s]].forEach(([sx,sy]) => {
        c.beginPath(); c.ellipse(sx, sy, 2.5*s, 1.5*s, 0.3, 0, Math.PI*2); c.fill();
      });
      // seaweed
      c.fillStyle = '#00897b';
      c.beginPath(); c.ellipse(0, -8*s, 22*s, 6*s, 0, 0, Math.PI*2); c.fill();
      // fish fillet
      c.fillStyle = '#01579b';
      c.beginPath(); c.ellipse(0, -2*s, 20*s, 5*s, 0, 0, Math.PI*2); c.fill();
      // cyan cheese
      c.fillStyle = '#80deea';
      c.beginPath(); c.ellipse(0, 4*s, 22*s, 4*s, 0, 0, Math.PI*2); c.fill();
      // bottom bun
      c.fillStyle = '#0288d1';
      c.beginPath(); c.ellipse(0, 10*s, 21*s, 8*s, 0, 0, Math.PI*2); c.fill();
      break;
    }

    case 'galaxy': {
      c.shadowColor = '#a855f7'; c.shadowBlur = 16;
      if (highlight) c.shadowBlur = 26;
      // top bun – deep purple
      c.fillStyle = '#4a148c';
      c.beginPath(); c.ellipse(0, -18*s, 20*s, 12*s, 0, Math.PI, 0); c.fill();
      // star seeds
      c.fillStyle = '#ffffff';
      c.shadowColor = '#fff'; c.shadowBlur = 6;
      [[-8*s,-22*s],[0,-24*s],[8*s,-22*s]].forEach(([sx,sy]) => {
        c.beginPath(); c.arc(sx, sy, 1.8*s, 0, Math.PI*2); c.fill();
      });
      c.shadowColor = '#a855f7'; c.shadowBlur = 16;
      // nebula layer
      c.fillStyle = '#7b1fa2';
      c.beginPath(); c.ellipse(0, -8*s, 22*s, 6*s, 0, 0, Math.PI*2); c.fill();
      // dark space patty
      c.fillStyle = '#1a237e';
      c.beginPath(); c.ellipse(0, -2*s, 20*s, 5*s, 0, 0, Math.PI*2); c.fill();
      // stardust cheese
      c.fillStyle = '#ce93d8';
      c.beginPath(); c.ellipse(0, 4*s, 22*s, 4*s, 0, 0, Math.PI*2); c.fill();
      // bottom bun
      c.fillStyle = '#4a148c';
      c.beginPath(); c.ellipse(0, 10*s, 21*s, 8*s, 0, 0, Math.PI*2); c.fill();
      c.shadowBlur = 0;
      break;
    }

    case 'neon': {
      if (highlight) { c.shadowColor = '#ff00ff'; c.shadowBlur = 28; }
      else { c.shadowColor = '#ff00ff'; c.shadowBlur = 12; }
      // top bun – near black
      c.fillStyle = '#0a0a14';
      c.beginPath(); c.ellipse(0, -18*s, 20*s, 12*s, 0, Math.PI, 0); c.fill();
      c.strokeStyle = '#ff00ff'; c.lineWidth = 1.5*s;
      c.beginPath(); c.ellipse(0, -18*s, 20*s, 12*s, 0, Math.PI, 0); c.stroke();
      // neon seeds
      c.fillStyle = '#00ffff'; c.shadowColor = '#00ffff'; c.shadowBlur = 8;
      [[-8*s,-22*s],[0,-24*s],[8*s,-22*s]].forEach(([sx,sy]) => {
        c.beginPath(); c.arc(sx, sy, 1.8*s, 0, Math.PI*2); c.fill();
      });
      c.shadowColor = '#ff00ff'; c.shadowBlur = 12;
      // neon green lettuce
      c.fillStyle = '#00ff41';
      c.beginPath(); c.ellipse(0, -8*s, 22*s, 6*s, 0, 0, Math.PI*2); c.fill();
      // dark patty
      c.fillStyle = '#0a0a14';
      c.beginPath(); c.ellipse(0, -2*s, 20*s, 5*s, 0, 0, Math.PI*2); c.fill();
      c.strokeStyle = '#00ffff'; c.lineWidth = 1.5*s;
      c.beginPath(); c.ellipse(0, -2*s, 20*s, 5*s, 0, 0, Math.PI*2); c.stroke();
      // magenta cheese
      c.fillStyle = '#ff00ff';
      c.beginPath(); c.ellipse(0, 4*s, 22*s, 4*s, 0, 0, Math.PI*2); c.fill();

// ── Particle system ───────────────────────────────────────────────────────────
function spawnParticles(x, y) {
  const colors = ['#e8a020','#3cb043','#f5c518','#7b3f00','#ff6b6b'];
  for (let i = 0; i < 18; i++) {
    const angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.3;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 3,
      life: 1, color: colors[i % colors.length],
      size: 4 + Math.random() * 6
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.18;
    p.life -= 0.03;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0, p.size * p.life), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function spawnFloatingText(x, y, text) {
  floatingTexts.push({ x, y, text, life: 1 });
}

function updateFloatingTexts() {
  floatingTexts = floatingTexts.filter(t => t.life > 0);
  floatingTexts.forEach(t => { t.y -= 1.5; t.life -= 0.025; });
}

function drawFloatingTexts() {
  floatingTexts.forEach(t => {
    ctx.save();
    ctx.globalAlpha = t.life;
    ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#2c7a00';
    ctx.lineWidth = 4;
    ctx.textAlign = 'center';
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  });
}

// ── Salad drawing ─────────────────────────────────────────────────────────────
function drawSalad(c, x, y, size, skinId) {
  const skin = SALAD_SKINS.find(s => s.id === skinId) || SALAD_SKINS[0];
  const emoji = skin.emoji;

// ── Pizza drawing ─────────────────────────────────────────────────────────────
function drawPizza(c, x, y, size, skinId) {
  const s = size / 40;
  c.save();
  c.translate(x, y);

  function sliceShape(ctx2) {
    ctx2.beginPath();
    ctx2.moveTo(0, 22 * s);
    ctx2.lineTo(-21 * s, -14 * s);
    ctx2.arc(0, -14 * s, 21 * s, Math.PI, 0, false);
    ctx2.closePath();
  }

  function drawSauce(ctx2, color) {
    ctx2.fillStyle = color;
    ctx2.beginPath();
    ctx2.moveTo(0, 14 * s);
    ctx2.lineTo(-17 * s, -10 * s);
    ctx2.lineTo(17 * s, -10 * s);
    ctx2.closePath();
    ctx2.fill();
  }

  function drawCheese(ctx2, color) {
    ctx2.fillStyle = color;
    ctx2.beginPath();
    ctx2.moveTo(0, 8 * s);
    ctx2.lineTo(-13 * s, -8 * s);
    ctx2.lineTo(13 * s, -8 * s);
    ctx2.closePath();
    ctx2.fill();
  }

  switch (skinId) {
    case 'classic': {
      c.fillStyle = '#d4874a';
      sliceShape(c); c.fill();
      drawSauce(c, '#cc2200');
      drawCheese(c, '#ffdd55');
      c.fillStyle = '#aa1100';
      [[-5 * s, -1 * s], [5 * s, 1 * s], [0 * s, 6 * s]].forEach(([px, py]) => {
        c.beginPath(); c.arc(px, py, 3 * s, 0, Math.PI * 2); c.fill();
      });
      break;
    }
    case 'cheese': {
      c.fillStyle = '#c8860a';
      sliceShape(c); c.fill();
      drawSauce(c, '#cc3300');
      c.fillStyle = '#ffe066';
      c.beginPath();
      c.moveTo(0, 10 * s);
      c.lineTo(-15 * s, -9 * s);
      c.lineTo(15 * s, -9 * s);
      c.closePath();
      c.fill();
      c.strokeStyle = '#ffaa00';
      c.lineWidth = 1.5 * s;
      [[-6 * s, -3 * s, 5 * s, 4 * s], [3 * s, -5 * s, 8 * s, 2 * s]].forEach(([x1, y1, x2, y2]) => {
        c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.stroke();
      });
      break;
    }
    case 'hawaii': {
      c.fillStyle = '#d4874a';
      sliceShape(c); c.fill();
      drawSauce(c, '#cc2200');
      drawCheese(c, '#ffdd55');
      c.fillStyle = '#ffcc00';
      [[-6 * s, 2 * s], [6 * s, -1 * s], [0 * s, 5 * s]].forEach(([px, py]) => {
        c.beginPath(); c.ellipse(px, py, 4 * s, 2.5 * s, 0.3, 0, Math.PI * 2); c.fill();
      });
      c.fillStyle = '#ff6633';
      [[-7 * s, -3 * s], [5 * s, 4 * s]].forEach(([px, py]) => {
        c.beginPath(); c.arc(px, py, 2.5 * s, 0, Math.PI * 2); c.fill();
      });
      break;
    }
    case 'spicy': {
      c.shadowColor = '#ff3300'; c.shadowBlur = 10;
      c.fillStyle = '#7a0f00';
      sliceShape(c); c.fill();
      c.shadowBlur = 0;
      drawSauce(c, '#9b0000');
      drawCheese(c, '#cc4400');
      c.fillStyle = '#ff4400';
      [[-6 * s, 0], [4 * s, -3 * s], [1 * s, 5 * s]].forEach(([px, py]) => {
        c.save();
        c.translate(px, py);
        c.beginPath();
        c.moveTo(0, -4 * s); c.quadraticCurveTo(3 * s, 0, 0, 4 * s);
        c.strokeStyle = '#ff6600'; c.lineWidth = 2 * s; c.stroke();
        c.restore();
      });
      break;
    }
    case 'mushroom': {

// ── Level up ──────────────────────────────────────────────────────────────────
function checkLevel() {
  const newLevel = Math.floor(score / 10) + 1;
  if (newLevel > level) {
    level = newLevel;
    levelEl.textContent = level;
    spawnInterval = Math.max(30, 90 - (level - 1) * 8);
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function update() {
  frameCount++;
  if (keys['ArrowLeft'])  basketX = clampBasket(basketX - 8);
  if (keys['ArrowRight']) basketX = clampBasket(basketX + 8);
  updateClouds();
  updateParticles();
  updateFloatingTexts();

  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnBurger();
    spawnTimer = 0;
  }

  pizzaSpawnTimer++;
  if (pizzaSpawnTimer >= pizzaSpawnInterval) {
    spawnPizza();
    pizzaSpawnTimer = 0;
    pizzaSpawnInterval = Math.max(80, 210 - (level - 1) * 15);
  }

  saladSpawnTimer++;
  if (saladSpawnTimer >= saladSpawnInterval) {
    spawnSalad();
    saladSpawnTimer = 0;
    saladSpawnInterval = Math.max(90, 180 - (level - 1) * 12);
  }

  burgers = burgers.filter(b => {
    b.wobble += b.wobbleSpeed;
    b.x += Math.sin(b.wobble) * 0.8;
    b.y += b.speed;

    if (b.y + b.size * 0.5 >= BASKET_Y - BASKET_H / 2) {
      if (Math.abs(b.x - basketX) < BASKET_W / 2 + b.size * 0.3) {
        score++;
        burgersCaught++;
        scoreEl.textContent = score;
        addCoins(1);
        spawnParticles(b.x, BASKET_Y - BASKET_H / 2);
        spawnFloatingText(b.x, BASKET_Y - BASKET_H / 2 - 20, '🍔 המבורגר! +1');
        checkLevel();
        return false;
      } else if (b.y - b.size > H) {
        missCount++;
        lives--;
        livesEl.textContent = lives;
        if (lives <= 0) { gameOver(); return false; }
        return false;
      }
    }
    return true;
  });

  pizzas = pizzas.filter(p => {
    p.wobble += p.wobbleSpeed;
    p.x += Math.sin(p.wobble) * 0.7;
    p.y += p.speed;
    p.spin += p.spinSpeed;

    if (p.y + p.size * 0.5 >= BASKET_Y - BASKET_H / 2) {
      if (Math.abs(p.x - basketX) < BASKET_W / 2 + p.size * 0.3) {
        score += 2;
        pizzasCaught++;
        scoreEl.textContent = score;
        addCoins(2);
        spawnParticles(p.x, BASKET_Y - BASKET_H / 2);
        spawnFloatingText(p.x, BASKET_Y - BASKET_H / 2 - 20, '🍕 פיצה! +2');
        checkLevel();
        return false;
      } else if (p.y - p.size > H) {
        missCount++;
        lives--;
        livesEl.textContent = lives;
        if (lives <= 0) { gameOver(); return false; }
        return false;
      }
    }
    return true;
  });

  salads = salads.filter(s => {
    s.wobble += s.wobbleSpeed;
    s.x += Math.sin(s.wobble) * 0.6;
    s.y += s.speed;
    s.spin += s.spinSpeed;

    if (s.y + s.size * 0.5 >= BASKET_Y - BASKET_H / 2) {
      if (Math.abs(s.x - basketX) < BASKET_W / 2 + s.size * 0.3) {
        score += 3;
        saladsCaught++;
        scoreEl.textContent = score;
        addCoins(3);
        spawnParticles(s.x, BASKET_Y - BASKET_H / 2);
        spawnFloatingText(s.x, BASKET_Y - BASKET_H / 2 - 20, '🥗 סלט! +3');
        checkLevel();
        return false;
      } else if (s.y - s.size > H) {
        missCount++;
        lives--;
        livesEl.textContent = lives;
        if (lives <= 0) { gameOver(); return false; }
        return false;
      }
    }
    return true;
  });
}

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#87CEEB');
  sky.addColorStop(0.7, '#b8e4f9');
  sky.addColorStop(1,   '#d4f5d4');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);
  clouds.forEach(drawCloud);
  ctx.fillStyle = '#76b041';
  ctx.beginPath();
  ctx.ellipse(W/2, H + 10, W * 0.6, 30, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#5a8f2f';
  ctx.fillRect(0, H - 12, W, 12);
}

function drawBasket() {
  const x = basketX, y = BASKET_Y, w = BASKET_W, h = BASKET_H;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(x, y + h / 2 + 4, w * 0.45, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  drawBasketSkin(ctx, x, y, w, h, shopData.activeSkin);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  burgers.forEach(b => drawBurger(ctx, b.x, b.y, b.size, false, shopData.activeBurgerSkin));
  pizzas.forEach(p => {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.spin);
    drawPizza(ctx, 0, 0, p.size, shopData.activePizzaSkin);
    ctx.restore();
  });
  salads.forEach(s => {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.spin);
    drawSalad(ctx, 0, 0, s.size, shopData.activeSaladSkin);
    ctx.restore();
  });
  drawBasket();
  drawParticles();
  drawFloatingTexts();
}

function loop() {
  if (!running) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ── Pause ─────────────────────────────────────────────────────────────────────
const pauseBtn = document.getElementById('pause-btn');

function drawPauseOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 38px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('⏸ המשחק מושהה', W / 2, H / 2 - 10);
  ctx.font = '20px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#ffe066';
  ctx.fillText('לחץ "המשך" כדי לחזור למשחק', W / 2, H / 2 + 34);
  ctx.restore();
}

window.togglePause = function() {
  if (!running) return;
  paused = !paused;
  if (paused) {
    cancelAnimationFrame(animId);
    pauseBtn.textContent = '▶ המשך';
    drawPauseOverlay();
  } else {
    pauseBtn.textContent = '⏸ השהה';
    loop();
  }
};

// ── Game control ──────────────────────────────────────────────────────────────
function showOverlay(html) {
  overlay.innerHTML = html;
  overlay.style.display = 'flex';
}

function gameOver() {
  running = false;
  paused = false;
  cancelAnimationFrame(animId);
  pauseBtn.style.display = 'none';
  pauseBtn.textContent = '⏸ השהה';

  // Record the completed run as an activity session (best-effort; the game
  // continues normally even if the API is unreachable).
  if (window._apiPostSession) {
    window._apiPostSession({
      score,
      levelReached: level,
      coinsEarned: coinsEarnedThisRun,
      burgersCaught,
      pizzasCaught,
      saladsCaught,
      itemsMissed: missCount,
      durationMs: runStartTime ? Date.now() - runStartTime : 0,
    });
  }

  showOverlay(`
    <div id="message-box">
      <h2>💀 המשחק נגמר!</h2>
      <p>תפסת <b>${score}</b> המבורגרים 🍔<br>הגעת לרמה ${level}!<br>🪙 מטבעות: ${shopData.coins}</p>
      <button onclick="startGame()">🔄 שחק שוב</button>
    </div>
  `);
}

window.startGame = function() {
  score = 0; lives = 3; level = 1; missCount = 0;
  burgersCaught = 0; pizzasCaught = 0; saladsCaught = 0;
  coinsEarnedThisRun = 0; runStartTime = Date.now();
  spawnTimer = 0; spawnInterval = 90; frameCount = 0;
  pizzaSpawnTimer = 0; pizzaSpawnInterval = 210;
  saladSpawnTimer = 0; saladSpawnInterval = 180;
  paused = false;
  burgers = []; pizzas = []; salads = []; particles = []; floatingTexts = [];
  basketX = W / 2;
  pauseBtn.textContent = '⏸ השהה';
  pauseBtn.style.display = 'block';
  scoreEl.textContent = 0;
  livesEl.textContent = 3;
  levelEl.textContent = 1;
  coinsEl.textContent = shopData.coins;
  overlay.style.display = 'none';
  initClouds();
  if (animId) cancelAnimationFrame(animId);
  running = true;
  loop();
};

// ── Save-on-exit ──────────────────────────────────────────────────────────────
// When the player leaves (closes the tab, switches app, navigates away), flush
// everything to Supabase before the page is torn down. `keepalive` keeps the
// requests alive through unload; running this only once avoids duplicate writes.
let _exitFlushed = false;
function flushOnExit() {
  if (_exitFlushed) return;
  _exitFlushed = true;

  // 1. Persist the latest progress (coins + all skins).
  localStorage.setItem('thinkFastShop', JSON.stringify(shopData));
  if (window._apiSaveProgress) {
    window._apiSaveProgress(shopData, { keepalive: true });
  }

  // 2. If a game is mid-run (no Game Over yet), record it as a session so the
  //    run isn't lost. Game Over already posts its own session and sets
  //    running=false, so this won't double-count finished games.
  if (running && window._apiPostSession) {
    window._apiPostSession({
      score,
      levelReached: level,
      coinsEarned: coinsEarnedThisRun,
      burgersCaught,
      pizzasCaught,
      saladsCaught,
      itemsMissed: missCount,
      durationMs: runStartTime ? Date.now() - runStartTime : 0,
    }, { keepalive: true });
  }
}

// `visibilitychange → hidden` is the most reliable exit signal on mobile (app
// switch / tab close); `pagehide` covers desktop navigation and bfcache.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    flushOnExit();
  } else {
    // Returned to the game — re-arm so the next exit flushes again.
    _exitFlushed = false;
  }
});
window.addEventListener('pagehide', flushOnExit);

// ── Init ──────────────────────────────────────────────────────────────────────
coinsEl.textContent = shopData.coins;
initClouds();
</script>
</body>
</html>
