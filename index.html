<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>המבורגר נופל! 🍔</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 60%, #90EE90 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 2rem;
      color: #c0392b;
      text-shadow: 2px 2px 0 #fff, 3px 3px 0 #e74c3c;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    #hud {
      display: flex;
      gap: 30px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #2c3e50;
      background: rgba(255,255,255,0.7);
      border-radius: 20px;
      padding: 8px 24px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    #hud span { display: flex; align-items: center; gap: 6px; }

    canvas {
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      background: transparent;
      cursor: none;
      display: block;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #message-box {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    #message-box h2 { font-size: 2.2rem; color: #c0392b; margin-bottom: 10px; }
    #message-box p  { font-size: 1.1rem; color: #555; margin-bottom: 20px; }
    #message-box button {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: #fff;
      border: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.1s;
    }
    #message-box button:hover { transform: scale(1.07); }

    #instructions {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #666;
      background: rgba(255,255,255,0.6);
      border-radius: 10px;
      padding: 6px 16px;
    }
  </style>
</head>
<body>

<h1>🍔 המבורגר נופל! 🍔</h1>

<div id="hud">
  <span>⭐ ניקוד: <b id="score-display">0</b></span>
  <span>❤️ חיים: <b id="lives-display">3</b></span>
  <span>⚡ רמה: <b id="level-display">1</b></span>
</div>

<div style="position:relative;">
  <canvas id="gameCanvas" width="480" height="560"></canvas>

  <div id="overlay">
    <div id="message-box">
      <h2>🍔 המבורגר נופל!</h2>
      <p>תפוס כמה שיותר המבורגרים!<br>אל תפספס יותר מ-3 🍔</p>
      <button id="start-btn" onclick="startGame()">🎮 חן משחק</button>
    </div>
  </div>
</div>

<p id="instructions">🖱️ הזז את העכבר / 👆 גע במסך כדי להזיז את הסל</p>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score-display');
const livesEl = document.getElementById('lives-display');
const levelEl = document.getElementById('level-display');
const overlay = document.getElementById('overlay');

// ── State ────────────────────────────────────────────────────────────────────
let score = 0, lives = 3, level = 1, missCount = 0;
let running = false, animId = null;
let burgers = [], particles = [], clouds = [];
let basketX = W / 2;
let spawnTimer = 0, spawnInterval = 90; // frames
let frameCount = 0;

// ── Basket ───────────────────────────────────────────────────────────────────
const BASKET_W = 80, BASKET_H = 50;
const basket = {
  y: H - BASKET_H - 10,
  get x() { return basketX - BASKET_W / 2; }
};

// ── Input ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  basketX = Math.max(BASKET_W/2, Math.min(W - BASKET_W/2,
    (e.clientX - rect.left) * (W / rect.width)));
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  basketX = Math.max(BASKET_W/2, Math.min(W - BASKET_W/2,
    (e.touches[0].clientX - rect.left) * (W / rect.width)));
}, { passive: false });

// ── Clouds ───────────────────────────────────────────────────────────────────
function initClouds() {
  clouds = [];
  for (let i = 0; i < 5; i++) {
    clouds.push({ x: Math.random() * W, y: 20 + Math.random() * 120,
      r: 30 + Math.random() * 30, speed: 0.2 + Math.random() * 0.3 });
  }
}

function updateClouds() {
  clouds.forEach(c => { c.x += c.speed; if (c.x - c.r > W) c.x = -c.r; });
}

function drawCloud(c) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(c.x,        c.y,      c.r,      0, Math.PI * 2);
  ctx.arc(c.x + c.r*0.8, c.y - c.r*0.3, c.r*0.7, 0, Math.PI * 2);
  ctx.arc(c.x - c.r*0.8, c.y - c.r*0.2, c.r*0.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── Burger drawing ────────────────────────────────────────────────────────────
function drawBurger(x, y, size) {
  const s = size / 40;
  ctx.save();
  ctx.translate(x, y);

  // top bun
  ctx.fillStyle = '#e8a020';
  ctx.beginPath();
  ctx.ellipse(0, -18*s, 20*s, 12*s, 0, Math.PI, 0);
  ctx.fill();
  // sesame seeds
  ctx.fillStyle = '#fff3c0';
  [[−8*s,−22*s],[0,−24*s],[8*s,−22*s]].forEach(([sx,sy]) => {
    ctx.beginPath(); ctx.ellipse(sx, sy, 2.5*s, 1.5*s, 0.3, 0, Math.PI*2); ctx.fill();
  });

  // lettuce
  ctx.fillStyle = '#3cb043';
  ctx.beginPath();
  ctx.ellipse(0, -8*s, 22*s, 6*s, 0, 0, Math.PI*2);
  ctx.fill();

  // patty
  ctx.fillStyle = '#7b3f00';
  ctx.beginPath();
  ctx.ellipse(0, -2*s, 20*s, 5*s, 0, 0, Math.PI*2);
  ctx.fill();

  // cheese
  ctx.fillStyle = '#f5c518';
  ctx.beginPath();
  ctx.ellipse(0, 4*s, 22*s, 4*s, 0, 0, Math.PI*2);
  ctx.fill();

  // bottom bun
  ctx.fillStyle = '#e8a020';
  ctx.beginPath();
  ctx.ellipse(0, 10*s, 21*s, 8*s, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ── Basket drawing ────────────────────────────────────────────────────────────
function drawBasket() {
  const bx = basket.x, by = basket.y;

  // shadow
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.ellipse(basketX, by + BASKET_H + 4, BASKET_W/2, 8, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // body
  ctx.save();
  ctx.fillStyle = '#c0392b';
  ctx.strokeStyle = '#922b21';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(bx + 6, by);
  ctx.lineTo(bx + BASKET_W - 6, by);
  ctx.lineTo(bx + BASKET_W, by + BASKET_H);
  ctx.lineTo(bx, by + BASKET_H);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // weave lines
  ctx.strokeStyle = '#922b21';
  ctx.lineWidth = 1.5;
  for (let i = 1; i < 4; i++) {
    const ly = by + (BASKET_H / 4) * i;
    ctx.beginPath(); ctx.moveTo(bx + i*1.5, ly); ctx.lineTo(bx + BASKET_W - i*1.5, ly); ctx.stroke();
  }
  for (let i = 1; i < 5; i++) {
    const lx = bx + (BASKET_W / 5) * i;
    ctx.beginPath(); ctx.moveTo(lx, by); ctx.lineTo(lx + 4, by + BASKET_H); ctx.stroke();
  }

  // rim
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.roundRect(bx - 4, by - 6, BASKET_W + 8, 12, 6);
  ctx.fill();
  ctx.strokeStyle = '#922b21';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();
}

// ── Particle system ───────────────────────────────────────────────────────────
function spawnParticles(x, y) {
  const colors = ['#e8a020','#3cb043','#f5c518','#7b3f00','#ff6b6b'];
  for (let i = 0; i < 18; i++) {
    const angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.3;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 3,
      life: 1, color: colors[i % colors.length],
      size: 4 + Math.random() * 6
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.18;
    p.life -= 0.03;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// ── Burger spawn ──────────────────────────────────────────────────────────────
function spawnBurger() {
  const size = 34 + Math.random() * 16;
  const speed = (1.5 + level * 0.4) * (0.85 + Math.random() * 0.3);
  burgers.push({
    x: size + Math.random() * (W - size * 2),
    y: -size,
    size,
    speed,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.04 + Math.random() * 0.03
  });
}

// ── Level up ──────────────────────────────────────────────────────────────────
function checkLevel() {
  const newLevel = Math.floor(score / 10) + 1;
  if (newLevel > level) {
    level = newLevel;
    levelEl.textContent = level;
    spawnInterval = Math.max(30, 90 - (level - 1) * 8);
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function update() {
  frameCount++;

  updateClouds();
  updateParticles();

  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnBurger();
    spawnTimer = 0;
  }

  burgers = burgers.filter(b => {
    b.wobble += b.wobbleSpeed;
    b.x += Math.sin(b.wobble) * 0.8;
    b.y += b.speed;

    // catch check
    if (
      b.y + b.size/2 >= basket.y &&
      b.y - b.size/2 <= basket.y + BASKET_H &&
      b.x + b.size/2 >= basket.x &&
      b.x - b.size/2 <= basket.x + BASKET_W
    ) {
      score++;
      scoreEl.textContent = score;
      spawnParticles(b.x, b.y);
      checkLevel();
      return false;
    }

    // missed
    if (b.y - b.size > H) {
      missCount++;
      lives--;
      livesEl.textContent = lives;
      if (lives <= 0) { gameOver(); return false; }
      return false;
    }
    return true;
  });
}

function drawBackground() {
  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#87CEEB');
  sky.addColorStop(0.7, '#b8e4f9');
  sky.addColorStop(1,   '#d4f5d4');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  clouds.forEach(drawCloud);

  // ground
  ctx.fillStyle = '#76b041';
  ctx.beginPath();
  ctx.ellipse(W/2, H + 10, W * 0.6, 30, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#5a8f2f';
  ctx.fillRect(0, H - 12, W, 12);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  burgers.forEach(b => drawBurger(b.x, b.y, b.size));
  drawBasket();
  drawParticles();
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ── Game control ──────────────────────────────────────────────────────────────
function showOverlay(html) {
  overlay.innerHTML = html;
  overlay.style.display = 'flex';
}

function gameOver() {
  running = false;
  cancelAnimationFrame(animId);
  showOverlay(`
    <div id="message-box">
      <h2>💀 המשחק נגמר!</h2>
      <p>ניקוד סופי: <b>${score}</b> 🍔<br>הגעת לרמה ${level}!</p>
      <button onclick="startGame()">🔄 שחק שוב</button>
    </div>
  `);
}

window.startGame = function() {
  score = 0; lives = 3; level = 1; missCount = 0;
  spawnTimer = 0; spawnInterval = 90; frameCount = 0;
  burgers = []; particles = [];
  basketX = W / 2;
  scoreEl.textContent = 0;
  livesEl.textContent = 3;
  levelEl.textContent = 1;
  overlay.style.display = 'none';
  initClouds();
  if (animId) cancelAnimationFrame(animId);
  running = true;
  loop();
};

initClouds();
</script>
</body>
</html>
